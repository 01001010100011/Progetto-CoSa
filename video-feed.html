<!doctype html>
<html lang="it" class="video-viewer-root">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Progetto CoSa | Video Feed</title>
    <meta
      name="description"
      content="Feed video verticale full-screen in formato 9:16 per i contenuti del Progetto CoSa."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="video-page">
    <header class="video-topbar" aria-label="Barra superiore video">
      <div class="video-topbar-left">
        <a class="video-home" href="index.html">Home</a>
      </div>
      <p class="video-title">Video</p>
      <div class="video-topbar-right" aria-hidden="true"></div>
    </header>

    <main class="reels-app" data-reels-feed tabindex="0" aria-label="Feed video verticale">
      <section class="reel-slide" data-index="0">
        <video
          class="reel-video"
          src="assets/videos/IMG_7374.MOV"
          muted
          autoplay
          loop
          playsinline
          preload="auto"
        ></video>
      </section>

      <section class="reel-slide" data-index="1">
        <video
          class="reel-video"
          src="assets/videos/IMG_7375.MOV"
          muted
          autoplay
          loop
          playsinline
          preload="metadata"
        ></video>
      </section>

      <section class="reel-slide" data-index="2">
        <video
          class="reel-video"
          src="assets/videos/IMG_7376.MOV"
          muted
          autoplay
          loop
          playsinline
          preload="metadata"
        ></video>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
